<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Crizaldo Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --muted: #52525b;
            --accent1: #000000;
            --accent2: #18181b;
            --card-bg: #ffffff;
            --card-border: #000000;
            --shadow-color: #000000;
            --shadow-offset: 6px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(rgba(0,0,0,0.06) 1.5px, transparent 1.5px),
                radial-gradient(rgba(0,0,0,0.06) 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border: 3px solid var(--card-border);
            border-radius: 0px;
            padding: 40px;
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--shadow-color);
            text-align: center;
        }

        .logo {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 32px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .logo-sub {
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 800;
            text-transform: uppercase;
        }

        p.subtitle {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 0px;
            border: 3px solid var(--text);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.15s;
            box-shadow: 3px 3px 0px var(--text);
        }

        input:focus {
            outline: none;
            background: var(--bg);
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px var(--text);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 0px;
            border: 3px solid var(--text);
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            margin-bottom: 16px;
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--shadow-color);
            background: var(--text);
            color: var(--bg);
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: calc(var(--shadow-offset) + 2px) calc(var(--shadow-offset) + 2px) 0px var(--shadow-color);
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--shadow-color);
        }

        .toggle-auth {
            font-size: 14px;
            color: var(--muted);
            font-weight: 600;
        }

        .toggle-auth span {
            color: var(--text);
            font-weight: 700;
            text-decoration: underline;
            cursor: pointer;
        }

        #errorMessage {
            color: #ef4444;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">CRIZALDO</div>
        <div class="logo-sub">Webdev Portfolio</div>
        
        <h2 id="authTitle">Welcome Back</h2>
        <p class="subtitle" id="authSubtitle">Please enter your details to sign in.</p>

        <div id="errorMessage"></div>
        <div id="successMessage" style="color: #22c55e; font-size: 13px; margin-bottom: 16px; display: none;"></div>

        <form id="authForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required minlength="6">
            </div>
            <div class="form-group" id="confirmGroup" style="display: none;">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">Sign In</button>
        </form>

        <div class="toggle-auth" id="toggleAuth" style="margin-top: 20px;">
            Don't have an account? <span onclick="toggleMode()" style="text-decoration: underline; font-weight: 700;">Sign Up</span>
        </div>

        <div id="demoBox" style="margin-top: 24px; text-align: center; font-size: 13.5px; color: var(--muted); padding: 14px; background: rgba(16, 185, 129, 0.08); border-radius: 10px; border: 1px dashed rgba(16, 185, 129, 0.3);">
            <strong style="color: var(--text);">Demo Login</strong><br>
            <div style="margin-top: 6px;">Email: <strong>username@gmail.com</strong></div>
            <div>Password: <strong>password</strong></div>
        </div>

    </div>

    <script type="module">
        import { auth } from './auth.js';

        let isSignUp = false;

        const form = document.getElementById('authForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const toggleAuthDiv = document.getElementById('toggleAuth');
        const confirmGroup = document.getElementById('confirmGroup');
        const confirmInput = document.getElementById('confirmPassword');
        const demoBox = document.getElementById('demoBox');

        window.toggleMode = function () {
            isSignUp = !isSignUp;
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (isSignUp) {
                authTitle.textContent = 'Create Account';
                authSubtitle.textContent = 'Sign up to get your own portfolio session.';
                submitBtn.textContent = 'Sign Up';
                toggleAuthDiv.innerHTML = 'Already have an account? <span onclick="toggleMode()" style="text-decoration: underline; font-weight: 700;">Sign In</span>';
                confirmGroup.style.display = 'block';
                confirmInput.required = true;
                demoBox.style.display = 'none';
            } else {
                authTitle.textContent = 'Welcome Back';
                authSubtitle.textContent = 'Please enter your details to sign in.';
                submitBtn.textContent = 'Sign In';
                toggleAuthDiv.innerHTML = 'Don\'t have an account? <span onclick="toggleMode()" style="text-decoration: underline; font-weight: 700;">Sign Up</span>';
                confirmGroup.style.display = 'none';
                confirmInput.required = false;
                demoBox.style.display = 'block';
            }
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (isSignUp) {
                const confirm = confirmInput.value;
                if (password !== confirm) {
                    errorDiv.textContent = 'Passwords do not match.';
                    errorDiv.style.display = 'block';
                    return;
                }
                if (password.length < 6) {
                    errorDiv.textContent = 'Password must be at least 6 characters.';
                    errorDiv.style.display = 'block';
                    return;
                }

                submitBtn.classList.add('loading');
                submitBtn.textContent = 'Creating Account...';

                try {
                    const { data, error } = await auth.signUp(email, password);

                    if (error) {
                        errorDiv.textContent = error.message;
                        errorDiv.style.display = 'block';
                    } else {
                        successDiv.textContent = '✓ Account created! Signing you in...';
                        successDiv.style.display = 'block';

                        const { data: loginData, error: loginError } = await auth.signIn(email, password);
                        if (loginError) {
                            successDiv.textContent = '✓ Account created! Please sign in.';
                            toggleMode();
                        } else {
                            window.location.href = 'index.html';
                        }
                    }
                } catch (err) {
                    errorDiv.textContent = 'An unexpected error occurred.';
                    errorDiv.style.display = 'block';
                } finally {
                    submitBtn.classList.remove('loading');
                    submitBtn.textContent = 'Sign Up';
                }
            } else {
                submitBtn.classList.add('loading');
                submitBtn.textContent = 'Signing In...';

                try {
                    const { data, error } = await auth.signIn(email, password);

                    if (error) {
                        errorDiv.textContent = error.message;
                        errorDiv.style.display = 'block';
                    } else {
                        window.location.href = 'index.html';
                    }
                } catch (err) {
                    errorDiv.textContent = 'An unexpected error occurred.';
                    errorDiv.style.display = 'block';
                } finally {
                    submitBtn.classList.remove('loading');
                    submitBtn.textContent = 'Sign In';
                }
            }
        });

        // Check if already logged in
        auth.getSession().then(({ session }) => {
            if (session) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
